stages:
  - generate
  - trigger
  - test

# Pipeline mode:
# - default (CI_PIPELINE_MODE unset): normal pytest CI
# - implementation (CI_PIPELINE_MODE=implementation): dedicated implementation pipeline

generator:
  stage: generate
  image: python:3.8-alpine
  variables:
    N_TESTS_PER_YAML: 4
  rules:
    - if: '$CI_PIPELINE_MODE == "implementation"'
      when: never
    - when: on_success
  tags:
    - k8s-default
  before_script:
    - pip install pyyaml
  script:
    - cd test/pytest
    - python generate_ci_yaml.py
  artifacts:
    paths:
      - test/pytest/pytests.yml

pytests:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_MODE == "implementation"'
      when: never
    - when: on_success
  trigger:
    include:
      - local: test/pytest/ci-template.yml
      - artifact: test/pytest/pytests.yml
        job: generator
    strategy: depend

implementation-pytests:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_MODE == "implementation"'
      when: on_success
    - when: never
  trigger:
    include:
      - local: test/pytest/implementation/ci-template.yml
      - local: test/pytest/implementation/pytests.yml
    strategy: depend
